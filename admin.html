<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Ripley</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f6f9; padding: 20px; color: #333; }
        header { background: #222; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 30px; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto 30px auto; }
        h3 { margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { background: #222; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }
        button:hover { background: #444; }

        /* Estilos para la lista de productos descontinuados */
        .lista-productos { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .producto-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; gap: 10px; }
        .producto-info { display: flex; align-items: center; gap: 15px; }
        .producto-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; background: #eee; }
        .producto-detalles h4 { font-size: 15px; margin-bottom: 3px; }
        .producto-detalles p { font-size: 12px; color: #666; }
        .btn-eliminar { background: #dc3545; color: white; padding: 8px 12px; border: none; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; width: auto; }
        .btn-eliminar:hover { background: #c82333; }
    </style>
</head>
<body>

    <header><h1>🛠️ PANEL DE CONTROL: ADMINISTRADOR</h1></header>

    <!-- FORMULARIO PARA AGREGAR -->
    <div class="box">
        <h3>Subir Nuevo Producto al Catálogo</h3>
        <form id="formProducto" onsubmit="enviarAlBackend(event)">
            <!-- NUEVOS CAMPOS: CÓDIGO Y VENDEDOR -->
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Código del Producto</label>
                    <input type="text" id="codigo" required placeholder="Ej. PROD-101">
                </div>
                <div style="flex: 1;">
                    <label>Vendedor Asignado</label>
                    <input type="text" id="vendedor" required placeholder="Nombre del vendedor">
                </div>
            </div>

            <div class="form-group"><label>Nombre del Ítem</label><input type="text" id="nombre" required></div>
            
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;"><label>Precio (S/.)</label><input type="number" step="0.01" id="precio" required></div>
                <div style="flex: 1;"><label>Stock Inicial (Unidades)</label><input type="number" id="stock" min="1" required placeholder="Ej. 10"></div>
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="categoria">
                    <option value="Tecnología">Tecnología</option>
                    <option value="Moda">Moda</option>
                    <option value="Servicios">Servicios</option>
                </select>
            </div>
            <!-- CAMBIO: ENLACE DE IMAGEN EN LUGAR DE ARCHIVO LOCAL -->
            <div class="form-group">
                <label>Enlace de la Imagen (URL de Internet)</label>
                <input type="url" id="imagenUrl" required placeholder="Ej. https://i.postimg.cc/image.jpg">
            </div>
            <div class="form-group"><label>Descripción / Detalles</label><textarea id="descripcion" rows="3" required></textarea></div>
            <button type="submit">Publicar en la Tienda</button>
        </form>
    </div>

    <!-- SECCIÓN: LISTA PARA ELIMINAR ITEMS DESCONTINUADOS -->
    <div class="lista-productos">
        <h3>Gestionar Catálogo Actual</h3>
        <div id="contenedorProductos">Cargando productos del servidor...</div>
    </div>

    <script>
        // Al cargar la página, traemos los productos existentes automáticamente
        document.addEventListener("DOMContentLoaded", cargarProductos);

        // 1. CARGAR Y MOSTRAR PRODUCTOS
        async function cargarProductos() {
            try {
                const res = await fetch('/api/productos');
                const productos = await res.json();
                const contenedor = document.getElementById('contenedorProductos');

                if (productos.length === 0) {
                    contenedor.innerHTML = "<p style='color: #888; font-size: 14px;'>No hay productos en el catálogo.</p>";
                    return;
                }

                contenedor.innerHTML = ""; // Limpiamos el texto de carga
                
                productos.forEach(prod => {
                    const idUnico = prod._id || prod.id; // Compatible con MongoDB (_id) y JSON (id)
                    contenedor.innerHTML += `
                        <div class="producto-item">
                            <div class="producto-info">
                                <img src="${prod.imagen || 'https://via.placeholder.com/50'}" alt="${prod.nombre}">
                                <div class="producto-detalles">
                                    <h4>${prod.nombre} <span style="color: #666; font-size: 11px;">(${prod.codigo || 'S/C'})</span></h4>
                                    <p>Vendedor: ${prod.vendedor || 'No asignado'}</p>
                                    <p>Precio: S/. ${prod.precio} | Stock: ${prod.stock || 0} u.</p>
                                </div>
                            </div>
                            <button class="btn-eliminar" onclick="eliminarProducto('${idUnico}')">Eliminar</button>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('contenedorProductos').innerHTML = "Error al conectar con el servidor.";
            }
        }

        // 2. ENVIAR NUEVO PRODUCTO (POST - JSON limpio)
        async function enviarAlBackend(e) {
            e.preventDefault();
            
            const nuevoProducto = {
                codigo: document.getElementById('codigo').value,
                vendedor: document.getElementById('vendedor').value,
                nombre: document.getElementById('nombre').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria: document.getElementById('categoria').value,
                descripcion: document.getElementById('descripcion').value,
                imagen: document.getElementById('imagenUrl').value // Captura el texto de la URL
            };

            try {
                const res = await fetch('/api/productos', { 
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(nuevoProducto)
                });
                
                if(res.ok) {
                    alert("✅ Producto publicado con stock inicial");
                    document.getElementById('formProducto').reset();
                    cargarProductos(); // <-- Recargamos la lista abajo para ver el nuevo item
                } else {
                    alert("❌ Error al guardar en el servidor.");
                }
            } catch (error) { 
                alert("Error de conexión al subir."); 
            }
        }

        // 3. ELIMINAR PRODUCTO DESCONTINUADO (DELETE)
        async function eliminarProducto(id) {
            if (!confirm("⚠️ ¿Estás completamente seguro de eliminar este producto descontinuado?")) return;

            try {
                const res = await fetch(`/api/productos/${id}`, { method: 'DELETE' });
                const resultado = await res.json();
                
                if (res.ok) {
                    alert("🗑️ " + resultado.mensaje);
                    cargarProductos(); // <-- Volvemos a listar para que desaparezca en vivo
                } else {
                    alert("No se pudo eliminar: " + resultado.error);
                }
            } catch (error) {
                alert("Error de conexión al intentar eliminar.");
            }
        }
    </script>
</body>
</html>
