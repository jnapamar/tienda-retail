<!-- SECCIÓN: REPORTE DE VENTAS -->
<div class="box" style="max-width: 800px; margin-top: 30px;">
    <h3>📊 Reporte Ejecutivo de Ventas</h3>
    <button onclick="cargarReporte()" style="margin-bottom: 20px; background: #007bff;">🔄 Actualizar Reporte</button>

    <!-- TARJETAS DE MÉTRICAS -->
    <div style="display: flex; gap: 15px; margin-bottom: 25px;">
        <div style="flex: 1; background: #e9ecef; padding: 15px; border-radius: 8px; text-align: center;">
            <span style="font-size: 12px; color: #666; font-weight: bold;">TOTAL VENTAS</span>
            <h2 id="metricTotalVentas" style="color: #222; margin-top: 5px;">0</h2>
        </div>
        <div style="flex: 1; background: #d4edda; padding: 15px; border-radius: 8px; text-align: center;">
            <span style="font-size: 12px; color: #155724; font-weight: bold;">INGRESOS TOTALES</span>
            <h2 id="metricIngresos" style="color: #28a745; margin-top: 5px;">S/. 0.00</h2>
        </div>
        <div style="flex: 1; background: #cce5ff; padding: 15px; border-radius: 8px; text-align: center;">
            <span style="font-size: 12px; color: #004085; font-weight: bold;">PROMEDIO / VENTA</span>
            <h2 id="metricPromedio" style="color: #007bff; margin-top: 5px;">S/. 0.00</h2>
        </div>
    </div>

    <!-- TABLA DE PRODUCTOS MÁS VENDIDOS -->
    <h4>🔥 Productos más vendidos</h4>
    <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
        <thead>
            <tr style="background: #222; color: white; text-align: left;">
                <th style="padding: 10px; border-radius: 5px 0 0 0;">Producto</th>
                <th style="padding: 10px; text-align: center; border-radius: 0 5px 0 0;">Cantidad Vendida</th>
            </tr>
        </thead>
        <tbody id="tablaTopProductos">
            <tr>
                <td colspan="2" style="padding: 15px; text-align: center; color: #888;">Cargando reporte...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Cargar reporte al abrir la página
    document.addEventListener("DOMContentLoaded", () => {
        cargarReporte();
    });

    async function cargarReporte() {
        try {
            const res = await fetch('/api/ventas/reporte');
            const data = await res.json();

            // 1. Actualizar las tarjetas de resumen
            document.getElementById('metricTotalVentas').innerText = data.resumen.totalVentas;
            document.getElementById('metricIngresos').innerText = `S/. ${data.resumen.ingresosTotales}`;
            document.getElementById('metricPromedio').innerText = `S/. ${data.resumen.promedioPorVenta}`;

            // 2. Llenar la tabla de top productos
            const tabla = document.getElementById('tablaTopProductos');
            tabla.innerHTML = "";

            const entradas = Object.entries(data.topProductos);

            if (entradas.length === 0) {
                tabla.innerHTML = `<tr><td colspan="2" style="padding: 15px; text-align: center; color: #888;">No hay ventas registradas aún.</td></tr>`;
                return;
            }

            // Ordenar de mayor a menor cantidad vendida
            entradas.sort((a, b) => b[1] - a[1]);

            entradas.forEach(([nombre, cantidad]) => {
                tabla.innerHTML += `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 10px; font-weight: bold;">${nombre}</td>
                        <td style="padding: 10px; text-align: center;">
                            <span style="background: #222; color: white; padding: 3px 10px; border-radius: 12px; font-size: 13px;">${cantidad} u.</span>
                        </td>
                    </tr>
                `;
            });

        } catch (error) {
            console.error("Error al cargar el reporte:", error);
        }
    }
</script>
